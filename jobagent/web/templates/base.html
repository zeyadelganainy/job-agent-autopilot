<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}job-agent{% endblock %} · job-agent</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
{% set p = request.url.path %}
<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="dot"></span> job-agent</div>
    <nav>
      <a class="navitem {{ 'active' if p == '/' }}" href="/">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="1.5" width="5" height="5" rx="1"/><rect x="9" y="1.5" width="5" height="5" rx="1"/><rect x="1.5" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
        <span>Dashboard</span></a>
      <a class="navitem {{ 'active' if p.startswith('/jobs') }}" href="/jobs">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5.5 4h8M5.5 8h8M5.5 12h8"/><path d="M2 4l.8.8L4.3 3.2M2 8l.8.8L4.3 7.2M2 12l.8.8L4.3 11.2"/></svg>
        <span>Jobs</span></a>
      <a class="navitem {{ 'active' if p.startswith('/generate') }}" href="/generate">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1.5l1.6 3.6 3.9.4-2.9 2.6.8 3.8L8 12.5l-3.4 1.9.8-3.8L2.5 5.9l3.9-.4z"/></svg>
        <span>Generate</span></a>
      <a class="navitem {{ 'active' if p == '/docs' }}" href="/docs">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 1.5h5l3 3V14a.5.5 0 0 1-.5.5h-7A.5.5 0 0 1 4 14V2a.5.5 0 0 1 .5-.5z"/><path d="M9 1.5V4.5h3"/></svg>
        <span>Docs</span></a>
      <a class="navitem {{ 'active' if p.startswith('/tracker') }}" href="/tracker">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="2" width="4" height="12" rx="1"/><rect x="6.8" y="2" width="4" height="8" rx="1"/><rect x="12" y="2" width="2.5" height="5" rx="1"/></svg>
        <span>Tracker</span></a>
      <a class="navitem {{ 'active' if p.startswith('/insights') }}" href="/insights">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2v12h12"/><path d="M5 11l2.5-3 2 2L13 5"/></svg>
        <span>Insights</span></a>
      <a class="navitem {{ 'active' if p.startswith('/settings') }}" href="/settings">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.3"/><path d="M8 1.5v2M8 12.5v2M14.5 8h-2M3.5 8h-2M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4M12.6 12.6l-1.4-1.4M4.8 4.8L3.4 3.4"/></svg>
        <span>Settings</span></a>
    </nav>
    <div class="sidebar-foot">
      <div class="meta">Next run <span id="next-scan" data-next="{{ next_scan_ts }}">{{ next_scan }}</span></div>
      <form method="post" action="/agent/run"><button class="btn btn-block">Run agent now</button></form>
    </div>
  </aside>

  <div class="content">
    <header class="topbar">
      <h1>{% block heading %}job-agent{% endblock %}</h1>
      <div class="actions">{% block actions %}{% endblock %}</div>
    </header>
    <main>{% block content %}{% endblock %}</main>
  </div>
</div>

<script src="/static/countdown.js"></script>
{% if task %}
<script>window.JOB_TASK = "{{ task }}";</script>
<script src="/static/app.js"></script>
{% endif %}
</body>
</html>
